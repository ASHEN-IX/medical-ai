# MedAI Nexus - Local Development Environment
# Run: docker-compose up -d
# All services will be available on localhost

services:
  # ===== FRONTEND =====
  frontend:
    pull_policy: never
    build:
      context: ./medical-web
      dockerfile: Dockerfile.frontend
    container_name: medai-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_AI_GATEWAY_URL=http://192.168.1.104:8001
      - NEXT_PUBLIC_API_URL=http://192.168.1.104:4000
      - NEXT_PUBLIC_SOCKET_URL=http://192.168.1.104:4000
      - NEXT_PUBLIC_APP_NAME=MedAI Nexus
      - NODE_ENV=development
    volumes:
      - ./medical-web/src:/app/src
      - ./medical-web/public:/app/public
    command: npm run dev
    depends_on:
      - backend
    networks:
      - medai-network

  # ===== BACKEND =====
  backend:
    pull_policy: never
    build:
      context: ./medical-api
      dockerfile: Dockerfile.backend
    container_name: medai-backend
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=postgresql://neondb_owner:npg_Qqz0ofdAWMu4@ep-sparkling-thunder-alrrp5fn-pooler.c-3.eu-central-1.aws.neon.tech/neondb?sslmode=require&pgbouncer=true&connect_timeout=15
      - JWT_SECRET=dev-secret-key-change-in-production
      - JWT_EXPIRATION=3600
      - NEO4J_URL=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=neo4j_password
      - AI_SERVICE_URL=http://ai-service:8001
      - AI_SERVICE_TIMEOUT_MS=120000
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=debug
    volumes:
      - ./medical-api/src:/app/src
      - ./medical-api/prisma:/app/prisma
    command: sh -lc "npm run prisma:generate && npm run start:dev"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - medai-network

  # ===== AI SERVICE =====
  ai-service:
    pull_policy: never
    build:
      context: ./ai-service
      dockerfile: Dockerfile.ai
    container_name: medai-ai-service
    ports:
      - "8001:8001"
    environment:
      - FASTAPI_ENV=development
      - FASTAPI_PORT=8001
      - FASTAPI_LOG_LEVEL=INFO
      - CORS_ORIGINS=*
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-openai/gpt-oss-120b}
      - SENTENCE_TRANSFORMERS_HOME=/data/sentence_transformers
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-test-key}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-AIzaSyBUmOQJRFXd2MZLLBnjcmeSnLaGy8eQ0nI}
      - NEO4J_URL=${NEO4J_URL:-bolt://neo4j:7687}
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-neo4j_password}
      - DATABASE_URL=postgresql://neondb_owner:npg_Qqz0ofdAWMu4@ep-sparkling-thunder-alrrp5fn-pooler.c-3.eu-central-1.aws.neon.tech/neondb?sslmode=require&pgbouncer=true&connect_timeout=15
      - FAISS_DATA_PATH=/data/faiss
      - MODELS_PATH=/models
    volumes:
      - ./ai-service/app:/app/app
      - ./ai-service/data/medical:/data/medical
      - ./ai-service/models:/models
      - ai-data:/data
    command: python -m uvicorn app.main:app --reload --host 0.0.0.0 --port 8001
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started
    networks:
      - medai-network

  # ===== POSTGRESQL DATABASE =====
  postgres:
    image: postgres:16-alpine
    container_name: medai-postgres
    environment:
      - POSTGRES_DB=medai_nexus
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medai_nexus"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - medai-network

  # ===== NEO4J GRAPH DATABASE =====
  neo4j:
    image: neo4j:5.11-community
    container_name: medai-neo4j
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-neo4j_password}
      - NEO4J_server_memory_heap_max__size=2G
      - NEO4J_server_default__advertised__address=localhost
    ports:
      - "7474:7474"  # Web UI
      - "7687:7687"  # Bolt Protocol
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    networks:
      - medai-network

  # ===== REDIS CACHE =====
  redis:
    image: redis:7-alpine
    container_name: medai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medai-network

  # ===== PROMETHEUS MONITORING =====
  prometheus:
    image: prom/prometheus:latest
    container_name: medai-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - medai-network
    depends_on:
      - ai-service

  # ===== GRAFANA DASHBOARDS =====
  grafana:
    image: grafana/grafana:latest
    container_name: medai-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - medai-network
    depends_on:
      - prometheus

networks:
  medai-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  neo4j-data:
    driver: local
  neo4j-logs:
    driver: local
  redis-data:
    driver: local
  ai-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
