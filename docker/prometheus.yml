# Prometheus Configuration
# Save as: docker/prometheus.yml

global:
  scrape_interval: 15s  # Default is every 1 minute
  evaluation_interval: 15s  # Evaluate rules every 15 seconds

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules once and periodically evaluate them
rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # Prometheus metrics
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # FastAPI AI Service metrics
  - job_name: 'medai-ai-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ai-service:8001']
    scrape_interval: 10s
    scrape_timeout: 5s

  # Optional: NestJS Backend metrics (if exposed)
  - job_name: 'medai-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:4000']
    scrape_interval: 15s
    scrape_timeout: 5s
